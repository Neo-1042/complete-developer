<!DOCTYPE html>
<html>

<head>
    <title>Chatbot</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>
    <!-- Running code from an external library-->
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <!-- Here you load REACT controlling the version -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <!-- Features specific for websites -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput() {
            return (
                <div>
                    <input></input>
                    <button>Send</button>
                </div>
            );
        }

        const div = (
            <div>
                <button>Hello, JSX Button</button>
                <p>JSX Paragraph of text {2+5}</p>
                {ChatInput()}
                <ChatInput></ChatInput>
            </div>
        );

        // DOM = Document Object Model
        const container = document.querySelector('.js-container'); // . --> means a class
        // To setup React, we have to give it an HTML element:
        // ReactDOM.createRoot(container).render('Hello, World from React! .js-container');
        // ReactDOM.createRoot(container).render(button);
        ReactDOM.createRoot(container).render(div);
    </script>
</body>

</html>
